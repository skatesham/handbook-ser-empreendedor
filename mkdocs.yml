site_name: Ser Empreendedor Handbook
site_description: Aprenda Gestão Organizando Sua Empresa
theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.ico
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - search.suggest
    - search.highlight
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: teal
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Mudar para modo escuro
    - scheme: slate
      primary: teal
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Mudar para modo claro
  icon:
    logo: material/flower
    repo: fontawesome/brands/github
  language: pt-BR

plugins:
  - search

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - md_in_html

nav:
  - 🏠 Início: index.md
  - 📊 Painel: painel.md
  - 🔄 Rituais:
    - rituais/index.md
    - 🗓️ Trimestral: rituais/trimestral.md
    - 📅 Mensal: rituais/mensal.md
    - 📆 Semanal: rituais/semanal.md
    - ☀️ Diário: rituais/diario.md
  - 📋 Quadro:
    - 📋 Visão Geral: quadro.md
    - 📋 Modelo 1: quadro-modelo-1.md
    - 📊 Modelo 2: quadro-modelo-2.md
    - 🚀 Modelo 3: quadro-modelo-3.md
  - 📈 Gestão:
    - 📊 Indicadores: indicadores.md
    - 🔍 Retrospectivas: retrospectivas.md
    - 🚨 Crises: crises.md
    - ♻️ Evolução: evolucao.md

repo_url: https://github.com/skatesham/handbook-ser-empreendedor
repo_name: handbook-ser-empreendedor
